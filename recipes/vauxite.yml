---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: vauxite
description: A modern lightweight atomic desktop

base-image: quay.io/fedora-ostree-desktops/xfce-atomic
image-version: 42

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: rpm-ostree
    install:
      - audacious
      - btop
      - catfish
      - edk2-ovmf
      - fastfetch
      - gdb
      - gdk-pixbuf2-modules-extra # Fix taskbar icons for Xfce 4.20
      - iotop
      - libcanberra
      - libcanberra-gtk3
      - libinput
      - libvirt
      - libvirt-nss
      - lightdm-gtk-greeter-settings
      - mate-disk-usage-analyzer
      - mate-system-monitor
      - mbpfan # Move to a MBP only build
      - menulibre
      - neovim
      - orage
      - patch
      - podman-compose
      - podman-machine
      - python3-cairosvg
      - python3-ramalama
      - qemu
      - qemu-char-spice
      - qemu-device-display-virtio-gpu
      - qemu-device-display-virtio-vga
      - qemu-device-usb-redirect
      - qemu-img
      - qemu-system-x86-core
      - qemu-user-binfmt
      - qemu-user-static
      - ruby
      - skippy-xd
      - strace
      - tailscale
      - ublue-brew
      - ublue-fastfetch
      - ublue-os-libvirt-workarounds
      - virt-manager
      - xdotool
      - xev
    remove:
      - firefox
      - firefox-langpacks
      - plymouth
      - plymouth-core-libs
      - plymouth-graphics-libs
      - plymouth-plugin-label
      - plymouth-plugin-two-step
      - plymouth-scripts
      - plymouth-system-theme
      - plymouth-theme-spinner

  - type: script
    scripts:
      - 00-image-info.sh
      - 01-ublue-main.sh
      - 02-ublue-packages.sh
      - 10-core.sh
      - 11-main.sh
      - 95-sanity-check.sh

  - type: default-flatpaks
    configurations:
      - notify: false # Do NOT send notification after install/uninstall is finished
        scope: system
        # Flathub will be used by default
        install:
          - com.calibre_ebook.calibre
          - com.github.iwalton3.jellyfin-media-player
          - com.github.johnfactotum.Foliate
          - com.github.tchx84.Flatseal
          - com.nextcloud.desktopclient.nextcloud
          - io.github.flattool.Warehouse
          - org.fedoraproject.MediaWriter
          - org.gnome.seahorse.Application
          - org.kde.gwenview
          - org.kde.okular
          - org.keepassxc.KeePassXC
          - org.libreoffice.LibreOffice
          - org.mozilla.firefox
          - org.qownnotes.QOwnNotes
          - org.videolan.VLC

  - type: signing

